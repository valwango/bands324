<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wripbands</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="background: #222;">
  <div class="login-container">
    <div class="login-title">login</div>
    <form id="login-form" autocomplete="off">
      <div class="login-error" id="login-error"></div>
      <input type="text" id="username" class="login-input" placeholder="email" required autofocus />
      <input type="password" id="password" class="login-input" placeholder="password" required />
      <button type="submit" class="login-btn">log in</button>
    </form>
  </div>
  <div class="login-signup-text">
  don't have an account? <a href="./signup.html" class="login-signup-link">sign up</a>
</div>
 <script type="module">
  // Import Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // Your config here
  const firebaseConfig = {
   apiKey: "AIzaSyAavRMHSoKc9IxmyUb7W_IbLNa-pmVoUVw",
  authDomain: "bands322-98e2b.firebaseapp.com",
  projectId: "bands322-98e2b",
  storageBucket: "bands322-98e2b.firebasestorage.app",
  messagingSenderId: "255200010894",
  appId: "1:255200010894:web:8e08f90861869333129fdf",
  measurementId: "G-Y1XTYDZVH6"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const form = document.getElementById('login-form');
  const errorDiv = document.getElementById('login-error');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = './index.html';
    } catch (error) {
      errorDiv.textContent = "Invalid login credentials.";
    }
  });
</script>
</body>
</html>
