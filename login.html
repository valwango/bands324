<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | bands</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .login-container {
      max-width: 320px;
      margin: 60px auto 0 auto;
      background: rgba(40,40,40,0.95);
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
      padding: 32px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .login-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5em;
      color: #fff;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    .login-input {
      width: 100%;
      margin-bottom: 18px;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1em;
      outline: none;
      transition: background 0.2s;
    }
    .login-input:focus {
      background: rgba(255,255,255,0.18);
    }
    .login-btn {
      width: 100%;
      padding: 10px 0;
      background: #fff;
      color: #222;
      border: none;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .login-btn:hover {
      background: #ffe066;
      color: #222;
    }
    .login-error {
      color: #ff5c5c;
      font-size: 0.98em;
      margin-bottom: 10px;
      min-height: 20px;
      text-align: center;
    }
  </style>
</head>
<body style="background: #222;">
  <div class="login-container">
    <div class="login-title">bands login</div>
    <form id="login-form" autocomplete="off">
      <div class="login-error" id="login-error"></div>
      <input type="text" id="username" class="login-input" placeholder="Username" required autofocus />
      <input type="password" id="password" class="login-input" placeholder="Password" required />
      <button type="submit" class="login-btn">Log In</button>
    </form>
  </div>
  <script>
    // Simple demo: username = admin, password = bands2026
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errorDiv = document.getElementById('login-error');
      if (user === 'admin' && pass === 'bands2026') {
        localStorage.setItem('bands_logged_in', '1');
        window.location.href = 'index.html';
      } else {
        errorDiv.textContent = 'Invalid username or password.';
      }
    });
  </script>
</body>
</html>
