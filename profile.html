<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>profile | wripbands</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="asset-version.js?v=20260516a"></script>
  <link rel="stylesheet" href="styles.css" id="app-stylesheet" />
  <script>document.getElementById("app-stylesheet").href = window.assetUrl("styles.css");</script>
</head>
<body>
   <header class="header">
    <a href="./index.html" class="header-title-btn">bands</a>
  </header>
  <main>
   <section class="profile-section">

    <!-- Stats section -->
    <div class="profile-stats">
      <div class="profile-stat">
        <span class="profile-stat-num" id="stat-shows">—</span>
        <span class="profile-stat-label">shows</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="stat-artists">—</span>
        <span class="profile-stat-label">artists</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="stat-venues">—</span>
        <span class="profile-stat-label">venues</span>
      </div>
    </div>
    <div class="profile-stats profile-stats-row2">
      <div class="profile-stat">
        <span class="profile-stat-num" id="stat-festivals">—</span>
        <span class="profile-stat-label">festivals</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-num" id="stat-upcoming">—</span>
        <span class="profile-stat-label">upcoming</span>
      </div>
    </div>

  <!-- Stat list modal -->
  <div id="stat-modal" class="modal">
    <div class="modal-content" style="position:relative;">
      <button id="close-stat-modal" class="close-editor">&times;</button>
      <h3 id="stat-modal-title" style="margin: 0 0 12px;"></h3>
      <ul id="stat-modal-list" class="stat-modal-list"></ul>
    </div>
  </div>

  <div class="profile-info">
    <div class="profile-details">
  <label for="username-input">user:</label>
  <input id="username-input" type="text" maxlength="32" autocomplete="off" spellcheck="false" />

  <label for="email-input">email:</label>
  <input id="email-input" type="email"/>

  <div class="profile-actions">
    <button id="save-profile-btn" class="site-btn">save changes</button>
    <button id="change-password-btn" class="site-btn">change password</button>
    <button id="logout-btn" class="site-btn">logout</button>
  </div>
</div>

      <!-- Re-auth modal -->
      <div id="reauth-modal" class="modal">
        <div class="modal-content">
          <button id="close-reauth-modal" class="close-editor">&times;</button>
          <h3 style="margin-top:0;">confirm your password</h3>
          <p style="margin:0 0 10px;opacity:0.7;font-size:0.85em;">re-enter your current password to continue</p>
          <input id="reauth-password-input" type="password" placeholder="current password" style="width:100%;box-sizing:border-box;" />
          <button id="reauth-submit-btn" class="site-btn" style="margin-top:10px;">confirm</button>
          <div id="reauth-msg" style="margin-top:8px;font-size:0.85em;color:var(--muted);"></div>
        </div>
      </div>

      <!-- Password input modal -->
      <div id="password-modal" class="modal">
        <div class="modal-content">
          <button id="close-password-modal" class="close-editor">&times;</button>
          <h3 style="margin-top:0;">change Password</h3>
          <label for="password-input"><strong>new password:</strong></label>
          <input id="password-input" type="password" placeholder="Enter new password" />
          <button id="submit-password-btn" class="site-btn">submit new password</button>
        </div>
      </div>
    </div>
  </div>

    <!-- logout button moved above -->

    <!-- Friends section -->
    <div class="friends-section">
      <div class="friends-header">
        <span class="friends-title">friends</span>
      </div>
      <div class="friends-my-id">
        your id: <span id="my-user-id" class="friends-id-value">—</span>
        <button id="copy-user-id-btn" class="friends-small-btn">copy</button>
        <button id="copy-invite-link-btn" class="friends-small-btn">copy invite link</button>
      </div>
      <div class="friends-add-row">
        <input id="add-friend-input" type="text" class="friends-input" placeholder="enter friend's user id" autocomplete="off" autocapitalize="none" spellcheck="false" />
        <button id="add-friend-btn" class="friends-small-btn">add</button>
      </div>
      <div id="add-friend-msg" class="friends-msg"></div>
      <ul id="friends-list" class="friends-list"></ul>
    </div>
  </main>
</body>
<script type="module" src="script.js"></script>
<script type="module" src="profile.js"></script>
</html>
