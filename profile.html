<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>profile | wripbands</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="asset-version.js?v=20260516k"></script>
  <link rel="stylesheet" href="styles.css" id="app-stylesheet" />
  <script>document.getElementById("app-stylesheet").href = window.assetUrl("styles.css");</script>
</head>
<body>
  <header class="header">
    <a href="./index.html" class="header-title-btn">wripbands</a>
  </header>
  <main class="pf-page">

    <!-- Profile card -->
    <div id="profile-card" class="pf-card" role="button" tabindex="0">
      <div class="pf-card-header">
        <span class="pf-card-username" id="display-username">—</span>
        <span class="pf-card-userid">USER <span id="my-user-id">—</span></span>
      </div>
      <div class="pf-card-top-label">MY TOP SHOWS</div>
      <div class="pf-card-top-row">
        <div class="pf-top-show" id="top-show-0"></div>
        <div class="pf-top-show" id="top-show-1"></div>
        <div class="pf-top-show" id="top-show-2"></div>
      </div>
    </div>

    <!-- Stats grid -->
    <div class="pf-stats-grid">
      <div class="pf-stat-box" data-stat="shows">
        <span class="pf-stat-label">SHOWS</span>
        <span class="pf-stat-num" id="stat-shows">—</span>
      </div>
      <div class="pf-stat-box" data-stat="festivals">
        <span class="pf-stat-label">FESTIVALS</span>
        <span class="pf-stat-num" id="stat-festivals">—</span>
      </div>
      <div class="pf-stat-box" data-stat="artists">
        <span class="pf-stat-label">ARTISTS</span>
        <span class="pf-stat-num" id="stat-artists">—</span>
      </div>
      <div class="pf-stat-box" data-stat="venues">
        <span class="pf-stat-label">VENUES</span>
        <span class="pf-stat-num" id="stat-venues">—</span>
      </div>
      <div class="pf-stat-box" data-stat="upcoming">
        <span class="pf-stat-label">UPCOMING SHOWS</span>
        <span class="pf-stat-num" id="stat-upcoming">—</span>
      </div>
      <div class="pf-stat-box" data-stat="friends">
        <span class="pf-stat-label">FRIENDS</span>
        <span class="pf-stat-num" id="stat-friends">—</span>
      </div>
    </div>

    <button id="add-friends-btn" class="pf-add-friends-btn">ADD FRIENDS</button>
  </main>

  <!-- Settings modal -->
  <div id="settings-modal" class="pf-modal">
    <div class="pf-modal-inner">
      <button class="pf-modal-close" id="close-settings-modal">&times;</button>
      <div class="pf-modal-field">
        <label class="pf-modal-label">USERNAME</label>
        <input id="username-input" type="text" class="pf-modal-input" maxlength="32" autocomplete="off" spellcheck="false" />
      </div>
      <div class="pf-modal-field">
        <label class="pf-modal-label">EMAIL</label>
        <input id="email-input" type="email" class="pf-modal-input" />
      </div>
      <div class="pf-modal-field">
        <label class="pf-modal-label">PASSWORD</label>
        <button id="change-password-btn" class="pf-modal-secondary-btn">CHANGE PASSWORD</button>
      </div>
      <div class="pf-modal-field">
        <label class="pf-modal-label">MY TOP SHOWS</label>
        <div id="top-shows-picker" class="pf-shows-picker"></div>
      </div>
      <button id="save-profile-btn" class="pf-modal-btn">SAVE</button>
      <button id="logout-btn" class="pf-modal-btn pf-modal-btn--danger">LOG OUT</button>
    </div>
  </div>

  <!-- Password modal -->
  <div id="password-modal" class="pf-modal">
    <div class="pf-modal-inner">
      <button class="pf-modal-close" id="close-password-modal">&times;</button>
      <div class="pf-modal-field">
        <label class="pf-modal-label">NEW PASSWORD</label>
        <input id="password-input" type="password" class="pf-modal-input" />
      </div>
      <button id="submit-password-btn" class="pf-modal-btn">UPDATE PASSWORD</button>
    </div>
  </div>

  <!-- Re-auth modal -->
  <div id="reauth-modal" class="pf-modal">
    <div class="pf-modal-inner">
      <button class="pf-modal-close" id="close-reauth-modal">&times;</button>
      <div class="pf-modal-field">
        <label class="pf-modal-label">CONFIRM PASSWORD</label>
        <input id="reauth-password-input" type="password" class="pf-modal-input" placeholder="current password" />
      </div>
      <button id="reauth-submit-btn" class="pf-modal-btn">CONFIRM</button>
      <div id="reauth-msg" class="pf-modal-msg"></div>
    </div>
  </div>

  <!-- Friends modal -->
  <div id="friends-modal" class="pf-modal">
    <div class="pf-modal-inner">
      <button class="pf-modal-close" id="close-friends-modal">&times;</button>
      <div class="pf-my-id-row">
        YOUR ID: <span id="my-user-id-friends" class="pf-my-id-val">—</span>
        <button id="copy-user-id-btn" class="pf-tiny-btn">COPY</button>
      </div>
      <div class="pf-modal-field">
        <input id="add-friend-input" type="text" class="pf-modal-input" placeholder="ENTER FRIEND'S USER ID" autocomplete="off" autocapitalize="none" spellcheck="false" />
      </div>
      <button id="add-friend-btn" class="pf-modal-btn">SEND REQUEST</button>
      <div id="add-friend-msg" class="pf-modal-msg"></div>
      <div class="pf-section-label">PENDING REQUESTS</div>
      <ul id="pending-list" class="pf-list"></ul>
      <div class="pf-section-label">FRIENDS</div>
      <ul id="friends-list" class="pf-list"></ul>
    </div>
  </div>

  <!-- Stat modal -->
  <div id="stat-modal" class="pf-modal">
    <div class="pf-modal-inner">
      <button class="pf-modal-close" id="close-stat-modal">&times;</button>
      <div class="pf-modal-title" id="stat-modal-title"></div>
      <ul id="stat-modal-list" class="stat-modal-list"></ul>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="profile.js"></script>
</body>
</html>
