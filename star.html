<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>add band | wripbands</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <script src="asset-version.js?v=20260516h"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" id="app-stylesheet" />
  <script>
    document.getElementById("app-stylesheet").href = window.assetUrl("styles.css");
  </script>
</head>

<body>

  <header class="header">
    <a href="./index.html" class="header-title-btn">wripbands</a>
  </header>

  <main style="padding-bottom: 72px;">
    <div class="star-photo-wrap" id="star-photo-wrap" style="margin-top:20px;">
      <div class="star" id="star-display">★</div>
      <button type="button" class="star-photo-add-btn" id="star-photo-btn" title="add photo"></button>
      <img class="star-photo-img" id="star-photo-img" style="display:none;" alt="show photo" />
      <input type="file" id="star-photo-input" accept="image/*" style="display:none;" />
    </div>

    <div id="photo-popup" class="photo-popup" style="display:none;">
      <div class="photo-popup-backdrop" id="photo-popup-backdrop"></div>
      <div class="photo-popup-sheet">
        <div class="photo-popup-photo-box">
          <button type="button" class="photo-popup-photo-plus" id="photo-popup-plus">+</button>
          <img class="photo-popup-preview" id="photo-popup-preview" style="display:none;" alt="" />
        </div>
        <div class="photo-popup-actions" id="photo-popup-actions-upload">
          <button type="button" class="photo-popup-btn" id="photo-popup-upload">upload photo</button>
        </div>
        <div class="photo-popup-actions photo-popup-actions--two" id="photo-popup-actions-replace" style="display:none;">
          <button type="button" class="photo-popup-btn" id="photo-popup-replace">replace</button>
          <button type="button" class="photo-popup-btn photo-popup-btn--submit" id="photo-popup-submit">keep</button>
        </div>
      </div>
    </div>

    <form id="add-show-form">
      <div style="width: 220px; margin: 0 auto;">
        <div class="type-toggle-row">
          <button type="button" id="is-concert" class="type-toggle-btn type-toggle-btn--active">concert</button>
          <button type="button" id="is-festival" class="type-toggle-btn">festival</button>
        </div>
        <input type="text" id="festival-name" placeholder="festival" class="star-input" style="display:none; width:100%; margin-bottom:10px;" />
        <div id="artist-fields">
          <div class="artist-input-wrap">
            <input type="text" id="band" placeholder="artist" required class="star-input artist-input" />
          </div>
        </div>
        <input type="text" id="venue" placeholder="venue" required class="star-input" style="display: block; width: 100%; margin-bottom: 10px;" />
        <div class="star-date-wrap" style="margin-bottom: 10px; position: relative;">
          <input type="text" id="custom-date" name="date" placeholder="date" class="star-input star-date-fake" autocomplete="off" required />
          <div id="custom-datepicker" class="custom-datepicker" style="display:none; position: absolute; left: 0; top: 100%;"></div>
        </div>
        <textarea id="diary" placeholder="diary note" rows="3" style="display: block; width: 100%; margin-bottom: 10px;"></textarea>
      </div>

      <div class="color-picker-row" id="color-picker-row">
        <!-- Color circles will be injected here -->
      </div>

      <input type="hidden" id="bgImage" name="bgImage" value="blackband.png" />
      <button type="submit" class="star-submit" style="padding-bottom: 14px;">add band</button>
    </form>
  </main>

  <!-- Firebase config and app logic -->
  <script type="module">import(window.assetUrl("star.js"));</script>

</body>
</html>
