<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bands</title>
  <script src="asset-version.js?v=20260405s"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" id="app-stylesheet" />
  <script>
    document.getElementById("app-stylesheet").href = window.assetUrl("styles.css");
  </script>
  <style>
    .artist-input-wrap {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }
    .artist-input-wrap input {
      flex: 1;
      display: block;
      width: 100%;
      padding: 6px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .artist-input-wrap button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 0 12px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 4px;
    }
    .artist-input-wrap button:hover {
      background: #45a049;
    }
    .remove-artist-btn {
      background: #ff5f5f;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      padding: 0 8px;
      border-radius: 4px;
    }
    .remove-artist-btn:hover {
      background: #ff2f2f;
    }
    /* Make add button align right */
    .add-artist-btn-container {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="./index.html" class="header-title-btn">bands</a>
  </header>

  <main>
    <div id="page-loading" class="page-loading" aria-live="polite" aria-label="Loading page">
      <div class="page-loading-star" aria-hidden="true">★</div>
    </div>

    <div class="star">⏾</div>

    <form id="add-show-form">
      <div style="width: 220px; margin: 0 auto;">
        <!-- Festival Name -->
        <input type="text" id="festival-name" placeholder="festival" required class="star-input" />

        <!-- Artists -->
        <div id="artist-fields">
          <div class="artist-input-wrap">
            <input type="text" class="star-input artist-input" placeholder="add artist" required />
          </div>
        </div>

        <!-- Add Artist Button -->
        <div class="add-artist-btn-container">
          <button type="button" id="add-artist-btn" class="star-submit">+</button>
        </div>

        <!-- Optional venue input -->
        <input type="text" id="venue" placeholder="venue" required class="star-input" />

        <!-- Date -->
        <div class="star-date-wrap" style="margin-bottom: 10px; position: relative;">
          <input type="text" id="custom-date" name="date" placeholder="date" class="star-input star-date-fake" autocomplete="off" required />
          <div id="custom-datepicker" class="custom-datepicker" style="display:none; position: absolute; left: 0; top: 100%;"></div>
        </div>

        <!-- Diary note -->
        <textarea id="diary" placeholder="diary note" rows="3" style="display: block; width: 100%; margin-bottom: 10px;"></textarea>
      </div>

      <div class="color-picker-fest" id="color-picker-fest">
        <!-- Color circles will be injected here -->
      </div>

      <input type="hidden" id="bgImage" name="bgImage" value="blacklong.png" />
      <button type="submit" class="star-submit">add festival band</button>
    </form>
  </main>

  <script type="module" src="./moon.js?v=20260405i"></script>
</body>
</html>
