<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sign up | wripbands</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-wordmark">WRIPBANDS</div>
  <div class="login-tagline">EVERY CONCERT IN ONE PLACE</div>

  <form id="signup-form" autocomplete="off">
    <div id="signup-error" class="login-error"></div>

    <input type="email" id="email" class="login-input" placeholder="EMAIL" required autofocus />
    <input type="password" id="password" class="login-input" placeholder="PASSWORD" required />
    <input type="password" id="confirm-password" class="login-input" placeholder="CONFIRM PASSWORD" required />

    <button type="submit" class="login-btn" style="display:none;">sign up</button>
  </form>

  <div class="login-signup-block">
    <div class="login-signup-prompt">ALREADY HAVE AN ACCOUNT?</div>
    <a href="./login.html" class="login-signup-cta">LOG IN</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
   apiKey: "AIzaSyAavRMHSoKc9IxmyUb7W_IbLNa-pmVoUVw",
  authDomain: "bands322-98e2b.firebaseapp.com",
  projectId: "bands322-98e2b",
  storageBucket: "bands322-98e2b.firebasestorage.app",
  messagingSenderId: "255200010894",
  appId: "1:255200010894:web:8e08f90861869333129fdf",
  measurementId: "G-Y1XTYDZVH6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const form = document.getElementById('signup-form');
  const errorDiv = document.getElementById('signup-error');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    errorDiv.textContent = '';

    if (password !== confirm) {
      errorDiv.textContent = "Passwords do not match.";
      return;
    }

    if (password.length < 6) {
      errorDiv.textContent = "Password must be at least 6 characters.";
      return;
    }

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const uid = cred.user.uid;
      // Assign sequential 6-digit user ID
      const counterRef = doc(db, "counters", "userCount");
      const userRef = doc(db, "users", uid);
      const userId = await runTransaction(db, async (transaction) => {
        const counterDoc = await transaction.get(counterRef);
        const nextCount = (counterDoc.exists() ? counterDoc.data().count : 0) + 1;
        const newId = String(nextCount).padStart(6, '0');
        transaction.set(counterRef, { count: nextCount });
        transaction.set(userRef, { userId: newId }, { merge: true });
        transaction.set(doc(db, "userIds", newId), { uid });
        return newId;
      });
      window.location.href = "./index.html";
    } catch (error) {
      errorDiv.textContent = error.message;
    }
  });
</script>

</body>
</html>
